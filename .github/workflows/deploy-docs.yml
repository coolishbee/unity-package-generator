name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: SampleProjects/Package-Generator-Sample/Library
          key: Library-${{ runner.os }}-${{ hashFiles('SampleProjects/Package-Generator-Sample/Packages/packages-lock.json', 'Packages/Package_Generator/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run Unity EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: SampleProjects/Package-Generator-Sample
          unityVersion: 6000.2.15f1
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Check generated project file
        run: test -f SampleProjects/Package-Generator-Sample/Coolishbee.PackageGenerator.Editor.csproj

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build documentation
        working-directory: Documentation
        run: ./GenerateDocWebsite.sh "https://coolishbee.github.io/unity-package-generator"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Documentation/docfx/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
